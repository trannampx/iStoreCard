name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Lấy mã nguồn ────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ───────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      # ── 3. Setup Java JDK 17 ──────────────────────────────────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # ── 4. Cache Gradle ───────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Cài thư viện NPM ───────────────────────────────────────
      - name: Install NPM dependencies
        working-directory: client
        run: npm ci

      # ── 6. Build Vite ─────────────────────────────────────────────
      - name: Build web (Vite)
        working-directory: client
        run: npm run build

      # ── 7. Xóa android cũ (skeleton sai), Capacitor tạo lại ──────
      - name: Remove old android folder
        working-directory: client
        run: rm -rf android

      # ── 8. Khởi tạo Capacitor Android ────────────────────────────
      - name: Capacitor add android
        working-directory: client
        run: npx cap add android

      # ── 9. Generate app icon ──────────────────────────────────────
      - name: Generate app icon
        working-directory: client
        run: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android

      # ── 10. Sync web assets ───────────────────────────────────────
      - name: Capacitor sync
        working-directory: client
        run: npx cap sync android

      # ── 11. Patch AndroidManifest: network config + CAMERA ───────
      - name: Patch AndroidManifest
        working-directory: client/android
        run: |
          mkdir -p app/src/main/res/xml

          cat > app/src/main/res/xml/network_security_config.xml << 'XMLEOF'
<?xml version="1.0" encoding="utf-8"?>
<network-security-config>
    <base-config cleartextTrafficPermitted="true">
        <trust-anchors>
            <certificates src="system"/>
        </trust-anchors>
    </base-config>
</network-security-config>
XMLEOF

          MANIFEST="app/src/main/AndroidManifest.xml"

          # Thêm networkSecurityConfig + usesCleartextTraffic
          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"|' "$MANIFEST"
          fi

          # Thêm quyền CAMERA
          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n</manifest>|' "$MANIFEST"
          fi

          echo "=== AndroidManifest.xml ==="
          cat "$MANIFEST"

      # ── 12. Patch MainActivity: bật Mixed Content cho HTTP LAN ───
      - name: Patch MainActivity for HTTP mixed content
        working-directory: client/android
        run: |
          MAIN=$(find app/src/main/java -name "MainActivity.java" | head -1)
          echo "Patching: $MAIN"

          python3 << 'PYEOF'
import re, sys

path = None
import subprocess
result = subprocess.run(['find', 'app/src/main/java', '-name', 'MainActivity.java'], capture_output=True, text=True)
path = result.stdout.strip().split('\n')[0]

with open(path, 'r') as f:
    content = f.read()

if 'MIXED_CONTENT_ALWAYS_ALLOW' in content:
    print('Already patched, skipping.')
    sys.exit(0)

# Thêm imports
content = content.replace(
    'import com.getcapacitor.BridgeActivity;',
    'import com.getcapacitor.BridgeActivity;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;'
)

# Thêm override onStart sau dấu { của class
content = content.replace(
    'public class MainActivity extends BridgeActivity {',
    '''public class MainActivity extends BridgeActivity {

    @Override
    public void onStart() {
        super.onStart();
        WebView webView = getBridge().getWebView();
        webView.getSettings().setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
    }'''
)

with open(path, 'w') as f:
    f.write(content)

print('Patched successfully!')
print(content)
PYEOF

      # ── 13. Tạo local.properties ──────────────────────────────────
      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # ── 14. Build APK Debug ───────────────────────────────────────
      - name: Build APK (Debug)
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 15. Upload APK ────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iStoreCard-v${{ github.run_number }}
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 16. Summary ───────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "✅ APK build thanh cong!"
          ls -lh client/android/app/build/outputs/apk/debug/
