name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install NPM dependencies
        working-directory: client
        run: npm ci

      - name: Build web (Vite)
        working-directory: client
        run: npm run build

      # Xoa toan bo thu muc android cu (co the chua file React Native sai)
      # Capacitor se tao lai dung chuan
      - name: Remove old android folder
        working-directory: client
        run: rm -rf android

      - name: Capacitor add android
        working-directory: client
        run: npx cap add android

      - name: Generate app icon
        working-directory: client
        run: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android

      - name: Capacitor sync
        working-directory: client
        run: npx cap sync android

      - name: Patch AndroidManifest (network + camera)
        working-directory: client/android
        run: |
          mkdir -p app/src/main/res/xml

          printf '<?xml version="1.0" encoding="utf-8"?>\n<network-security-config>\n    <base-config cleartextTrafficPermitted="true">\n        <trust-anchors>\n            <certificates src="system"/>\n        </trust-anchors>\n    </base-config>\n</network-security-config>\n' > app/src/main/res/xml/network_security_config.xml

          MANIFEST="app/src/main/AndroidManifest.xml"

          if ! grep -q "networkSecurityConfig" "$MANIFEST"; then
            sed -i 's|<application|<application android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"|' "$MANIFEST"
          fi

          if ! grep -q "android.permission.CAMERA" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.CAMERA"/>\n</manifest>|' "$MANIFEST"
          fi

          echo "=== AndroidManifest.xml ===" && cat "$MANIFEST"

      - name: Create local.properties
        working-directory: client/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK (Debug)
        working-directory: client/android
        run: |
          chmod +x gradlew
          echo "=== Java version ==="
          java -version
          echo "=== Project structure ==="
          find app/src/main/java -name "*.java" | head -10
          echo "=== Build ==="
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iStoreCard-v${{ github.run_number }}
          path: client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "APK build thanh cong!"
          ls -lh client/android/app/build/outputs/apk/debug/
